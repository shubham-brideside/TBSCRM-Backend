# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - TBS-CRM

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Opt into Node.js 24 for JS-based actions (GitHub deprecation of Node 20 runners)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java version
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v5
        with:
          name: java-app
          path: target/*.jar

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v5
        with:
          name: java-app

      # Artifact preserves paths (e.g. target/*.jar). '*.jar' at repo root matches nothing → ZIP deploy fails.
      - name: Locate Spring Boot JAR
        id: jar
        shell: pwsh
        run: |
          $candidates = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Filter "*.jar" -File |
            Where-Object { $_.Name -notlike "original-*" -and $_.Name -notlike "*-sources.jar" -and $_.Name -notlike "*-javadoc.jar" }
          if (-not $candidates) { throw "No deployable JAR found under workspace after artifact download." }
          $jar = $candidates | Sort-Object Length -Descending | Select-Object -First 1
          Write-Host "Deploying JAR: $($jar.FullName)"
          "jar_path=$($jar.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DDA53701B75C4A7386DFA8AC6EC7C5B6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8F5604BEF1C545939611E655123CFBF0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CC5BEE8C24CA4792BE173E781BD71F0D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'TBS-CRM'
          slot-name: 'Production'
          package: ${{ steps.jar.outputs.jar_path }}
